<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gui-agent demo · mini console</title>
    <style>
      /* Always light — the demo forces a white background so it looks the same
         regardless of the OS dark-mode setting. */
      :root { color-scheme: light; --bd: #d8dadf; --mut: #6b7280; --accent: #2563eb; }
      * { box-sizing: border-box; }
      body { margin: 0; font: 14px/1.5 system-ui, sans-serif; display: grid; grid-template-columns: 1fr 360px; height: 100vh; background: #fff; color: #18181b; }
      main { padding: 24px 32px; overflow: auto; }
      h1 { font-size: 20px; margin: 0 0 4px; }
      .sub { color: var(--mut); margin: 0 0 20px; }
      nav { display: flex; gap: 4px; border-bottom: 1px solid var(--bd); margin-bottom: 20px; }
      nav button { background: none; border: none; padding: 8px 14px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--mut); font: inherit; }
      nav button[aria-selected="true"] { color: var(--accent); border-bottom-color: var(--accent); }
      .panel { display: none; }
      .panel.active { display: block; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--bd); }
      th { color: var(--mut); font-weight: 600; }
      input, select { padding: 8px 10px; border: 1px solid var(--bd); border-radius: 8px; font: inherit; width: 100%; }
      label { display: block; font-weight: 600; margin: 12px 0 4px; }
      button.primary { background: var(--accent); color: #fff; border: none; padding: 9px 16px; border-radius: 8px; cursor: pointer; font: inherit; margin-top: 16px; }
      .field { max-width: 320px; }
      .toast { margin-top: 16px; padding: 10px 12px; background: #ecfdf5; color: #065f46; border-radius: 8px; display: none; }
      aside { border-left: 1px solid var(--bd); display: flex; flex-direction: column; overflow: hidden; }
      aside header { padding: 14px 16px; border-bottom: 1px solid var(--bd); font-weight: 600; }
      #log { flex: 1; min-height: 0; overflow: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
      .msg { padding: 8px 10px; border-radius: 10px; max-width: 90%; white-space: pre-wrap; }
      .msg.user { background: var(--accent); color: #fff; align-self: flex-end; }
      .msg.agent { background: rgba(127,127,127,.14); align-self: flex-start; }
      #agent-steps { padding: 0 16px 8px; }
      form.ask { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--bd); }
      form.ask input { flex: 1; }
    </style>
  </head>
  <body>
    <main>
      <h1>Acme Console</h1>
      <p class="sub">A mini stand-in for a real product console — driven by gui-agent.</p>

      <nav id="tabs">
        <button role="tab" aria-selected="true" data-tab="users">Users</button>
        <button role="tab" aria-selected="false" data-tab="team">Team</button>
        <button role="tab" aria-selected="false" data-tab="profile">Profile</button>
        <button role="tab" aria-selected="false" data-tab="workflows">Workflows</button>
      </nav>

      <section class="panel active" data-panel="users">
        <div class="field"><label for="user-search">Search users</label>
          <input id="user-search" placeholder="Filter by name…" /></div>
        <table>
          <thead><tr><th>Name</th><th>Country</th><th>Status</th></tr></thead>
          <tbody id="user-rows"></tbody>
        </table>
      </section>

      <section class="panel" data-panel="team">
        <div class="field">
          <label for="invite-email">Invite a teammate</label>
          <input id="invite-email" type="email" placeholder="name@company.com" />
          <label for="invite-role">Role</label>
          <select id="invite-role"><option>Viewer</option><option>Editor</option><option>Admin</option></select>
          <button class="primary" id="invite-send">Send invite</button>
          <div class="toast" id="invite-toast"></div>
        </div>
      </section>

      <section class="panel" data-panel="profile">
        <div class="field"><label for="display-name">Display name</label>
          <input id="display-name" value="Aral Roca" /></div>
      </section>

      <section class="panel" data-panel="workflows">
        <p class="sub" style="margin-bottom:12px">
          A node-based flow editor built on React Flow (@xyflow/react). Nodes the agent adds
          mount asynchronously, so the glow must wait for them (highlight by selector).
        </p>
        <!-- React Flow mounts here. Fixed height so the canvas has a size. -->
        <div id="wf-canvas" style="height:460px;border:1px solid var(--bd);border-radius:12px"></div>
      </section>
    </main>

    <aside id="assistant-panel">
      <header>🤖 Assistant</header>
      <div id="log"></div>
      <div id="agent-steps"></div>
      <form class="ask" id="ask">
        <input id="goal" placeholder='e.g. "invite jane@acme.com as admin"' autocomplete="off" />
        <button class="primary" style="margin:0">Run</button>
      </form>
    </aside>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
